version: '3.8'

services:
  # PostgreSQL база данных
  postgres:
    image: postgres:15-alpine
    container_name: app_store_monitor_db
    environment:
      POSTGRES_DB: app_store_monitor
      POSTGRES_USER: monitor_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monitor_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor_user -d app_store_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # FastAPI приложение
  app:
    build: .
    container_name: app_store_monitor_app
    environment:
      DATABASE_URL: postgresql://monitor_user:${POSTGRES_PASSWORD:-monitor_password}@postgres:5432/app_store_monitor
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      MONITOR_INTERVAL: ${MONITOR_INTERVAL:-30}
      MONITOR_JITTER: ${MONITOR_JITTER:-5}
      RATE_LIMIT: ${RATE_LIMIT:-100}
      # Email уведомления (опционально)
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      ALERT_EMAIL: ${ALERT_EMAIL:-}
      # Telegram уведомления (опционально)
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      # Google Sheets (опционально)
      GOOGLE_CREDENTIALS: ${GOOGLE_CREDENTIALS:-}
      SPREADSHEET_ID: ${SPREADSHEET_ID:-}
      SHEET_NAME: ${SHEET_NAME:-AppStoreMonitor}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./app/templates:/app/app/templates
    restart: unless-stopped
    networks:
      - app_network

volumes:
  postgres_data:
    driver: local

networks:
  app_network:
    driver: bridge
