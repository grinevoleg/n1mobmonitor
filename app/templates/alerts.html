<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Store Monitor - Журнал событий</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            color: #8892b0;
            font-size: 1.1rem;
        }
        
        .nav {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }
        
        .nav a {
            color: #8892b0;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }
        
        .nav a:hover, .nav a.active {
            background: rgba(0, 217, 255, 0.2);
            color: #00d9ff;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #8892b0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .alerts-table {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .alerts-header {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .alerts-header h2 {
            font-size: 1.5rem;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #1a1a2e;
        }
        
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 16px 24px;
            text-align: left;
        }
        
        th {
            background: rgba(255, 255, 255, 0.05);
            color: #8892b0;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }
        
        tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        tr:last-child {
            border-bottom: none;
        }
        
        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        
        tr.unread {
            background: rgba(0, 217, 255, 0.05);
        }
        
        .alert-type {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .alert-emoji {
            font-size: 1.5rem;
        }
        
        .alert-message {
            font-size: 0.95rem;
        }
        
        .app-name {
            font-weight: 500;
        }
        
        .app-identifier {
            font-family: 'Monaco', 'Consolas', monospace;
            background: rgba(0, 217, 255, 0.1);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #00d9ff;
        }
        
        .timestamp {
            color: #8892b0;
            font-size: 0.85rem;
        }
        
        .read-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            text-transform: uppercase;
        }
        
        .read-badge.unread {
            background: rgba(0, 217, 255, 0.2);
            color: #00d9ff;
        }
        
        .read-badge.read {
            background: rgba(255, 255, 255, 0.1);
            color: #8892b0;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8892b0;
        }
        
        .filters {
            display: flex;
            gap: 10px;
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: transparent;
            color: #8892b0;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: rgba(0, 217, 255, 0.2);
            border-color: #00d9ff;
            color: #00d9ff;
        }
        
        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            margin-right: 8px;
            transition: all 0.3s;
        }
        
        .action-btn.read {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }
        
        .action-btn.delete {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
        }
        
        .action-btn:hover {
            transform: translateY(-1px);
        }
        

        .loader-container {
            text-align: center;
            padding: 40px;
            color: #8892b0;
        }
        
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 3px solid #00d9ff;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .stat-value { font-size: 1.5rem; }
            th, td { padding: 12px 16px; font-size: 0.85rem; }
            .nav { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔔 Журнал событий</h1>
            <p class="subtitle">App Store Monitor - Алерты и уведомления</p>
        </header>
        
        <nav class="nav">
            <a href="/dashboard">📊 Дашборд</a>
            <a href="/alerts" class="active">🔔 Алерты</a>
            <a href="/settings">⚙️ Настройки</a>
        </nav>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">Всего</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-unread" style="color: #00d9ff;">0</div>
                <div class="stat-label">Непрочитанные</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-status" style="color: #ff4757;">0</div>
                <div class="stat-label">Статус</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-version" style="color: #00d9ff;">0</div>
                <div class="stat-label">Версии</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-error" style="color: #ffa502;">0</div>
                <div class="stat-label">Ошибки</div>
            </div>
        </div>
        
        <div class="alerts-table">
            <div class="alerts-header">
                <h2>События</h2>
                <div>
                    <button class="btn btn-secondary" onclick="markВсеAsПрочитано()">Прочитать все</button>
                </div>
            </div>
            
            <div class="filters">
                <button class="filter-btn active" data-filter="all">Все</button>
                <button class="filter-btn" data-filter="unread">Непрочитанные</button>
                <button class="filter-btn" data-filter="status_change">Статус</button>
                <button class="filter-btn" data-filter="version_change">Версии</button>
                <button class="filter-btn" data-filter="error">Ошибки</button>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>Тип</th>
                        <th>Приложение</th>
                        <th>Сообщение</th>
                        <th>Время</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="alerts-body">
                    <tr>
                        <td colspan="6" class="empty-state">Загрузка...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    

    <script>
        // Авторизация
        function getAuthHeader() {
            const auth = localStorage.getItem('adminAuth');
            return auth ? `Basic ${auth}` : null;
        }

        function checkAuth() {
            if (!getAuthHeader()) {
                showAuthModal();
                return false;
            }
            return true;
        }

        function showAuthModal() {
            const login = prompt('Введите логин администратора:');
            const password = prompt('Введите пароль:');
            if (login && password) {
                localStorage.setItem('adminAuth', btoa(`${login}:${password}`));
                location.reload();
            }
        }

        let currentFilter = 'all';
        let alertsData = [];
        
        // Загрузка алертов
        async function loadAlerts() {
            try {
                const response = await fetch('/api/v1/alerts?limit=100', { headers: { 'Authorization': getAuthHeader() } });
                alertsData = await response.json();
                renderAlerts();
                loadStats();
            } catch (error) {
                console.error('Ошибка загрузки алертов:', error);
            }
        }
        
        // Загрузка статистики
        async function loadStats() {
            try {
                const response = await fetch('/api/v1/alerts/stats', { headers: { 'Authorization': getAuthHeader() } });
                const stats = await response.json();
                
                document.getElementById('stat-total').textContent = stats.total;
                document.getElementById('stat-unread').textContent = stats.unread;
                document.getElementById('stat-status').textContent = stats.by_type.status_change || 0;
                document.getElementById('stat-version').textContent = stats.by_type.version_change || 0;
                document.getElementById('stat-error').textContent = stats.by_type.error || 0;
            } catch (error) {
                console.error('Ошибка загрузки статистики:', error);
            }
        }
        
        // Рендеринг алертов
        function renderAlerts() {
            const tbody = document.getElementById('alerts-body');
            
            let filtered = alertsData;
            
            if (currentFilter === 'unread') {
                filtered = alertsData.filter(a => !a.is_read);
            } else if (currentFilter !== 'all') {
                filtered = alertsData.filter(a => a.alert_type === currentFilter);
            }
            
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Нет событий для отображения</td></tr>';
                return;
            }
            
            tbody.innerHTML = filtered.map(alert => `
                <tr class="${alert.is_read ? '' : 'unread'}">
                    <td>
                        <div class="alert-type">
                            <span class="alert-emoji">${alert.alert_emoji}</span>
                            <span>${alert.alert_type}</span>
                        </div>
                    </td>
                    <td>
                        <div class="app-name">${alert.app_name || '—'}</div>
                        <div class="app-identifier">${alert.app_identifier || '—'}</div>
                    </td>
                    <td>
                        <div class="alert-message">${alert.message}</div>
                    </td>
                    <td>
                        <span class="timestamp">${formatDate(alert.created_at)}</span>
                    </td>
                    <td>
                        <span class="read-badge ${alert.is_read ? 'read' : 'unread'}">
                            ${alert.is_read ? 'Прочитано' : 'Новое'}
                        </span>
                    </td>
                    <td>
                        ${!alert.is_read ? `<button class="action-btn read" onclick="markAsПрочитано(${alert.id})">✓</button>` : ''}
                        <button class="action-btn delete" onclick="deleteAlert(${alert.id})">✕</button>
                    </td>
                </tr>
            `).join('');
        }
        
        // Форматирование даты
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('ru-RU', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        // Отметить как прочитанное
        async function markAsПрочитано(alertId) {
            try {
                await fetch(`/api/v1/alerts/${alertId}/read`, { method: 'POST', headers: { 'Authorization': getAuthHeader() } });
                loadAlerts();
            } catch (error) {
                console.error('Ошибка:', error);
            }
        }
        
        // Отметить все как прочитанное
        async function markВсеAsПрочитано() {
            try {
                await fetch('/api/v1/alerts/read-all', { method: 'POST', headers: { 'Authorization': getAuthHeader() } });
                loadAlerts();
            } catch (error) {
                console.error('Ошибка:', error);
            }
        }
        
        // Удалить алерт
        async function deleteAlert(alertId) {
            if (!confirm('Удалить это событие?')) return;
            
            try {
                await fetch(`/api/v1/alerts/${alertId}`, { method: 'DELETE', headers: { 'Authorization': getAuthHeader() } });
                loadAlerts();
            } catch (error) {
                console.error('Ошибка:', error);
            }
        }
        
        // Фильтры
        document.querySelectorВсе('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorВсе('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderAlerts();
            });
        });
        
        // Первоначальная загрузка
        loadAlerts();
        
        // Автообновление каждые 60 секунд
        setInterval(loadAlerts, 60000);
    </script>
</body>
</html>
